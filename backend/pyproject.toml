[tool.black]
line-length = 100
target-version = ["py312"]
exclude = '''
/(
    \.venv
  | migrations
)/
'''

[tool.ruff]
line-length = 100
target-version = "py312"
exclude = [".venv", "migrations"]

[tool.ruff.lint]
select = ["E", "F", "W", "I", "UP", "B", "C4", "SIM"]
ignore = ["E501"]

[tool.mypy]
python_version = "3.12"
plugins = ["mypy_django_plugin.main"]
ignore_missing_imports = true
strict = false
exclude = ["migrations/", "\\.venv/"]

[tool.django-stubs]
django_settings_module = "config.settings.local"
