  # Gate — skip everything if CI did not pass
  # ─────────────────────────────────────────────────────────────
  guard:
    name: CI passed?
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success'
    steps:
      - run: echo "CI passed — proceeding to deploy"

