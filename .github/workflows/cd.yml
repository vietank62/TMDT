name: CD

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

concurrency:
  group: cd-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────────────────────────
  # Gate — skip everything if CI did not pass
  # ─────────────────────────────────────────────────────────────
  guard:
    name: CI passed?
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success'
    steps:
      - run: echo "CI passed — proceeding to deploy"

  # ─────────────────────────────────────────────────────────────
  # Detect which top-level folders changed
  # ─────────────────────────────────────────────────────────────
  changes:
    name: Detect changed paths
    runs-on: ubuntu-latest
    needs: guard
    permissions:
      contents: read
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - name: Checkout source at CI commit
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 2

      - name: Filter changed paths
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
            frontend:
              - 'frontend/**'

  # ─────────────────────────────────────────────────────────────
  # Backend — build → push to ACR → deploy
  # ─────────────────────────────────────────────────────────────
  deploy-backend:
    name: Deploy Backend
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    environment: production
    permissions:
      id-token: write
      contents: read

    env:
      IMAGE: ${{ secrets.ACR_LOGIN_SERVER }}/micromentor-backend

    steps:
      - name: Checkout source at CI commit
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Login to Azure Container Registry
        run: az acr login --name ${{ secrets.ACR_NAME }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ github.event.workflow_run.head_sha }}
            ${{ env.IMAGE }}:latest
          cache-from: type=registry,ref=${{ env.IMAGE }}:buildcache
          cache-to: type=registry,ref=${{ env.IMAGE }}:buildcache,mode=max

      - name: Sync secrets
        run: |
          az containerapp secret set \
            --name "${{ secrets.AZURE_BACKEND_APP_NAME }}" \
            --resource-group "${{ secrets.AZURE_RESOURCE_GROUP }}" \
            --secrets \
              "django-secret-key=${{ secrets.DJANGO_SECRET_KEY }}" \
              "db-password=${{ secrets.DB_PASSWORD }}" \
              "firebase-credentials=${{ secrets.FIREBASE_CREDENTIALS_JSON }}" \
              "azure-account-key=${{ secrets.AZURE_ACCOUNT_KEY }}" \
              "agora-app-certificate=${{ secrets.AGORA_APP_CERTIFICATE }}" \
              "sepay-merchant-secret-key=${{ secrets.SEPAY_MERCHANT_SECRET_KEY }}"

      - name: Set runtime environment variables
        run: |
          az containerapp update \
            --name "${{ secrets.AZURE_BACKEND_APP_NAME }}" \
            --resource-group "${{ secrets.AZURE_RESOURCE_GROUP }}" \
            --set-env-vars \
              "DEBUG=False" \
              "ALLOWED_HOSTS=${{ secrets.BACKEND_ALLOWED_HOSTS }}" \
              "CORS_ALLOWED_ORIGINS=${{ secrets.CORS_ALLOWED_ORIGINS }}" \
              "SECRET_KEY=secretref:django-secret-key" \
              "DB_ENGINE=mssql" \
              "DB_NAME=${{ secrets.DB_NAME }}" \
              "DB_USER=${{ secrets.DB_USER }}" \
              "DB_PASSWORD=secretref:db-password" \
              "DB_HOST=${{ secrets.DB_HOST }}" \
              "DB_PORT=1433" \
              "FIREBASE_CREDENTIALS_JSON=secretref:firebase-credentials" \
              "AZURE_ACCOUNT_NAME=${{ secrets.AZURE_ACCOUNT_NAME }}" \
              "AZURE_ACCOUNT_KEY=secretref:azure-account-key" \
              "AZURE_CONTAINER_PUBLIC=public" \
              "AZURE_CONTAINER_PRIVATE=private" \
              "AGORA_APP_ID=${{ secrets.AGORA_APP_ID }}" \
              "AGORA_APP_CERTIFICATE=secretref:agora-app-certificate" \
              "SEPAY_MERCHANT_ID=${{ secrets.SEPAY_MERCHANT_ID }}" \
              "SEPAY_MERCHANT_SECRET_KEY=secretref:sepay-merchant-secret-key"

      - name: Deploy to Azure Container App
        uses: azure/container-apps-deploy-action@v2
        with:
          resourceGroup: ${{ secrets.AZURE_RESOURCE_GROUP }}
          containerAppName: ${{ secrets.AZURE_BACKEND_APP_NAME }}
          imageToDeploy: ${{ env.IMAGE }}:${{ github.event.workflow_run.head_sha }}
          registryUrl: ${{ secrets.ACR_LOGIN_SERVER }}
          registryUsername: ${{ secrets.ACR_USERNAME }}
          registryPassword: ${{ secrets.ACR_PASSWORD }}

  # ─────────────────────────────────────────────────────────────
  # Frontend — build → push to ACR → deploy
  # ─────────────────────────────────────────────────────────────
  deploy-frontend:
    name: Deploy Frontend
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    environment: production
    permissions:
      id-token: write
      contents: read

    env:
      IMAGE: ${{ secrets.ACR_LOGIN_SERVER }}/micromentor-frontend

    steps:
      - name: Checkout source at CI commit
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Login to Azure Container Registry
        run: az acr login --name ${{ secrets.ACR_NAME }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ github.event.workflow_run.head_sha }}
            ${{ env.IMAGE }}:latest
          build-args: |
            NEXT_PUBLIC_FIREBASE_API_KEY=${{ secrets.NEXT_PUBLIC_FIREBASE_API_KEY }}
            NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN=${{ secrets.NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN }}
            NEXT_PUBLIC_FIREBASE_PROJECT_ID=${{ secrets.NEXT_PUBLIC_FIREBASE_PROJECT_ID }}
            NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET=${{ secrets.NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET }}
            NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID=${{ secrets.NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}
            NEXT_PUBLIC_FIREBASE_APP_ID=${{ secrets.NEXT_PUBLIC_FIREBASE_APP_ID }}
            NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID=${{ secrets.NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID }}
            NEXT_PUBLIC_API_BASE_URL=${{ secrets.NEXT_PUBLIC_API_BASE_URL }}
          cache-from: type=registry,ref=${{ env.IMAGE }}:buildcache
          cache-to: type=registry,ref=${{ env.IMAGE }}:buildcache,mode=max

      - name: Deploy to Azure Container App
        uses: azure/container-apps-deploy-action@v2
        with:
          resourceGroup: ${{ secrets.AZURE_RESOURCE_GROUP }}
          containerAppName: ${{ secrets.AZURE_FRONTEND_APP_NAME }}
          imageToDeploy: ${{ env.IMAGE }}:${{ github.event.workflow_run.head_sha }}
          registryUrl: ${{ secrets.ACR_LOGIN_SERVER }}
          registryUsername: ${{ secrets.ACR_USERNAME }}
          registryPassword: ${{ secrets.ACR_PASSWORD }}
