services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - ./backend/.env
    volumes:
      - ./backend:/app
      - ./certs:/certs:ro
    ports:
      - "8000:8000"
    # Override production CMD: use dev server with hot reload
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py runserver 0.0.0.0:8000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      # Stop at the builder stage — keeps node_modules and supports hot reload.
      # The runner stage (standalone production image) is used in production only.
      target: builder
    restart: unless-stopped
    env_file:
      - ./frontend/.env
    volumes:
      - ./frontend:/app
      # Preserve node_modules and .next built inside the container image so
      # the host mount doesn't shadow them.
      - /app/node_modules
      - /app/.next
    ports:
      - "3000:3000"
    depends_on:
      - backend
    # Override production CMD: use dev server with hot reload
    command: npm run dev
