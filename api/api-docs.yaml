            application/json:
              schema:
                $ref: '#/components/schemas/PayoutListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /admin/payouts/{payoutId}/process:
    post:
      summary: Process payout (admin)
      description: Mark a pending payout as processed after bank transfer is complete.
      operationId: adminProcessPayout
      tags: [Payouts]
      security:
        - FirebaseAuth: []
      parameters:
        - $ref: '#/components/parameters/PayoutIdPath'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                adminNote:
                  type: string
                  example: Đã chuyển khoản Vietcombank thành công.
      responses:
        '200':
          description: Payout processed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Payout'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'

  /admin/payouts/{payoutId}/reject:
    post:
      summary: Reject payout request (admin)
      operationId: adminRejectPayout
      tags: [Payouts]
      security:
        - FirebaseAuth: []
      parameters:
        - $ref: '#/components/parameters/PayoutIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [adminNote]
              properties:
                adminNote:
                  type: string
                  example: Thông tin tài khoản ngân hàng không hợp lệ.
      responses:
        '200':
          description: Payout rejected.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Payout'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
