openapi: 3.0.3
info:
  title: MicroMentor API
  version: 1.0.0
  description: |
    REST API for MicroMentor — a knowledge marketplace connecting users with verified
    expert professionals for short, high-impact online consultation sessions.

    ## Authentication
    All protected endpoints require a Firebase ID token passed as a Bearer token:
    ```
    Authorization: Bearer <firebase-id-token>
    ```
    Firebase handles registration, login, Google OAuth, and password reset.
    The backend verifies the token and manages local user records.

    ## Roles
    - `USER` — requests consultations
    - `EXPERT` — provides consultation services (a user with an approved expert application)
    - `ADMIN` — platform administrator with a separate admin profile

    ## Currency
    All monetary values are in Vietnamese Dong (VND), stored and transmitted as integers.

servers:
  - url: http://localhost:8000/api
    description: Local development
  - url: https://api.micromentor.vn/api
    description: Production

tags:
  - name: Auth
    description: Firebase token sync and current user profile
  - name: Admin Auth
    description: Administrator authentication and profile
  - name: Users
    description: User profile management
  - name: Experts
    description: Expert discovery and public profiles
  - name: Expert Profile
    description: Expert's own profile management
  - name: Expert Applications
    description: Apply to become an expert and manage applications
  - name: Availability
    description: Expert availability slot management
  - name: Bookings
    description: Consultation booking lifecycle
  - name: File Uploads
    description: Presigned URL generation and upload confirmation
  - name: Payments
    description: SEPay payment orders and history
  - name: Refunds
    description: Refund requests and processing
  - name: Reviews
    description: Post-session reviews
  - name: Notifications
    description: In-app notifications
  - name: Payouts
    description: Expert earnings and payout requests
  - name: Admin Dashboard
    description: Platform-wide metrics
  - name: Admin Users
    description: Administrative user management
  - name: Admin Experts
    description: Administrative expert management
  - name: Admin Applications
    description: Expert application review
  - name: Admin Bookings
    description: Administrative booking management
  - name: Admin Payments
    description: Administrative payment management
  - name: Admin Refunds
    description: Administrative refund management
  - name: Admin Reviews
    description: Review moderation
  - name: Audit Logs
    description: Immutable audit trail for critical state transitions

# ─────────────────────────────────────────────
# SECURITY SCHEMES
# ─────────────────────────────────────────────
components:
  securitySchemes:
    FirebaseAuth:
      type: http
      scheme: bearer
      bearerFormat: Firebase ID Token
      description: Firebase ID token obtained from the Firebase client SDK.

  # ─────────────────────────────────────────────
  # REUSABLE PARAMETERS
  # ─────────────────────────────────────────────
  parameters:
    PageParam:
      name: page
      in: query
      schema:
        type: integer
        minimum: 1
        default: 1
    PageSizeParam:
      name: pageSize
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 10
    SortOrderParam:
      name: sortOrder
      in: query
      schema:
        type: string
        enum: [asc, desc]
        default: desc
    BookingIdPath:
      name: bookingId
      in: path
      required: true
      schema:
        type: string
    PaymentIdPath:
      name: paymentId
      in: path
      required: true
      schema:
        type: string
    RefundIdPath:
      name: refundId
      in: path
      required: true
      schema:
        type: string
    UserIdPath:
      name: userId
      in: path
      required: true
      schema:
        type: string
    ExpertIdPath:
      name: expertId
      in: path
      required: true
      schema:
        type: string
    ApplicationIdPath:
      name: applicationId
      in: path
      required: true
      schema:
        type: string
    ReviewIdPath:
      name: reviewId
      in: path
      required: true
      schema:
        type: string
    NotificationIdPath:
      name: notificationId
      in: path
      required: true
      schema:
        type: string
    SlotIdPath:
      name: slotId
      in: path
      required: true
      schema:
        type: string
    PayoutIdPath:
      name: payoutId
      in: path
      required: true
      schema:
        type: string
    PortfolioItemIdPath:
      name: itemId
      in: path
      required: true
      schema:
        type: string
    CertificationIdPath:
      name: certId
      in: path
      required: true
      schema:
        type: string

  # ─────────────────────────────────────────────
  # ENUMS
  # ─────────────────────────────────────────────
  schemas:

    UserRole:
      type: string
      enum: [USER, EXPERT, ADMIN]

    BookingStatus:
      type: string
      enum:
        - DRAFT
        - PENDING_APPROVAL
        - REJECTED
        - APPROVED_AWAITING_PAYMENT
        - EXPIRED_UNPAID
        - PAID_CONFIRMED
        - IN_PROGRESS
        - COMPLETED
        - CANCELLED_BY_USER
        - CANCELLED_BY_EXPERT
        - NO_SHOW_USER
        - NO_SHOW_EXPERT
        - REFUND_PENDING
        - REFUNDED

    PaymentStatus:
      type: string
      enum: [PENDING, PAID, REFUNDED, FAILED, EXPIRED, CANCELLED]

    RefundStatus:
      type: string
      enum: [PENDING, APPROVED, REJECTED, PROCESSED]

    ExpertApplicationStatus:
      type: string
      enum: [PENDING_REVIEW, APPROVED, REJECTED, NEEDS_REVISION]

    ExpertProfileStatus:
      type: string
      enum: [PENDING_REVIEW, APPROVED, NEEDS_REVISION]

    NotificationType:
      type: string
      enum:
        - BOOKING_ACCEPTED
        - BOOKING_REJECTED
        - PAYMENT_SUCCESS
        - SESSION_REMINDER
        - REFUND_SUCCESS
        - NEW_REVIEW
        - APPLICATION_APPROVED
        - APPLICATION_REJECTED
        - PROFILE_UPDATE_APPROVED

    PayoutStatus:
      type: string
      enum: [PENDING, PROCESSED, REJECTED]

    ExpertCategory:
      type: string
      enum:
        - technology
        - business
        - finance
        - marketing
        - design
        - legal
        - healthcare
        - education
        - career
        - startup

    SessionDuration:
      type: integer
      enum: [30, 60, 90]
      description: Session duration in minutes (maps to 2, 4, or 6 consecutive 15-min slots)

    AuditAction:
      type: string
      enum:
        - BOOKING_STATUS_CHANGED
        - PAYMENT_STATUS_CHANGED
        - APPLICATION_STATUS_CHANGED
        - REFUND_STATUS_CHANGED
        - EXPERT_PROFILE_UPDATED
        - USER_ROLE_CHANGED
        - PAYOUT_PROCESSED

    # ─────────────────────────────────────────────
    # PAGINATION
    # ─────────────────────────────────────────────
    PaginationMeta:
      type: object
      required: [page, pageSize, totalItems, totalPages]
      properties:
        page:
          type: integer
          example: 1
        pageSize:
          type: integer
          example: 10
        totalItems:
          type: integer
          example: 100
        totalPages:
          type: integer
          example: 10

    # ─────────────────────────────────────────────
    # ERROR SCHEMA
    # ─────────────────────────────────────────────
    ErrorResponse:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
          example: VALIDATION_ERROR
        message:
          type: string
          example: The request contains invalid data.
        details:
          type: object
          additionalProperties:
            type: array
            items:
              type: string
          example:
            email: ["This field is required."]

    # ─────────────────────────────────────────────
    # DOMAIN SCHEMAS
    # ─────────────────────────────────────────────
    User:
      type: object
      required: [id, email, fullName, roles, createdAt, isActive]
      properties:
        id:
          type: string
          example: usr_01HXYZ
        firebaseUid:
          type: string
          example: firebase_uid_abc123
        email:
          type: string
          format: email
          example: nguyen.van.a@example.com
        fullName:
          type: string
          example: Nguyễn Văn A
        avatarUrl:
          type: string
          format: uri
          nullable: true
          example: https://storage.micromentor.vn/avatars/usr_01HXYZ.jpg
        phone:
          type: string
          nullable: true
          example: "0912345678"
        roles:
          type: array
          items:
            $ref: '#/components/schemas/UserRole'
          example: [USER]
        profileCompleted:
          type: boolean
          example: true
        onboardingStep:
          type: integer
          nullable: true
          example: null
        createdAt:
          type: string
          format: date-time
          example: "2025-01-15T08:00:00Z"
        isActive:
          type: boolean
          example: true

    Admin:
      type: object
      required: [id, email, fullName, roles]
      properties:
        id:
          type: string
          example: adm_001
        firebaseUid:
          type: string
          example: firebase_admin_uid
        email:
          type: string
          format: email
          example: admin@micromentor.vn
        fullName:
          type: string
          example: Quản trị viên hệ thống
        avatarUrl:
          type: string
          format: uri
          nullable: true
          example: https://storage.micromentor.vn/avatars/adm_001.jpg
        roles:
          type: array
          items:
            $ref: '#/components/schemas/UserRole'
          example: [ADMIN]
        createdAt:
          type: string
          format: date-time
          example: "2024-01-01T00:00:00Z"

    Certification:
      type: object
      required: [id, name, issuer, year]
      properties:
        id:
          type: string
          example: cert_01
        name:
          type: string
          example: AWS Solutions Architect Professional
        issuer:
          type: string
          example: Amazon Web Services
        year:
          type: integer
          example: 2023
        url:
          type: string
          format: uri
          nullable: true
          example: https://www.credly.com/badges/abc123

    PortfolioItem:
      type: object
      required: [id, title, description]
      properties:
        id:
          type: string
          example: port_01
        title:
          type: string
          example: Hệ thống thương mại điện tử microservices
        description:
          type: string
          example: Xây dựng nền tảng TMĐT với 10M+ người dùng.
        url:
          type: string
          format: uri
          nullable: true
          example: https://github.com/example/project
        imageUrl:
          type: string
          format: uri
          nullable: true

    ExpertProfile:
      type: object
      required:
        - id
        - userId
        - slug
        - displayName
        - title
        - bio
        - skills
        - yearsOfExperience
        - pricePerSession
        - rating
        - reviewCount
        - totalSessions
        - category
        - isAvailable
        - profileStatus
      properties:
        id:
          type: string
          example: exp_01HXYZ
        userId:
          type: string
          example: usr_01HXYZ
        slug:
          type: string
          example: nguyen-van-a-tech
        displayName:
          type: string
          example: Nguyễn Văn A
        title:
          type: string
          example: Senior Software Engineer
        company:
          type: string
          nullable: true
          example: Google Vietnam
        bio:
          type: string
          example: >
            Kỹ sư phần mềm với hơn 10 năm kinh nghiệm trong lĩnh vực công nghệ.
        skills:
          type: array
          items:
            type: string
          example: [React, Node.js, Python, AWS]
        yearsOfExperience:
          type: integer
          example: 10
        pricePerSession:
          type: integer
          description: Price per 15-minute slot in VND
          example: 300000
        sessionDurationMinutes:
          type: integer
          description: Preferred session length in minutes (30, 60, or 90)
          example: 60
        rating:
          type: number
          format: float
          example: 4.8
        reviewCount:
          type: integer
          example: 42
        totalSessions:
          type: integer
          example: 105
        linkedinUrl:
          type: string
          format: uri
          nullable: true
          example: https://linkedin.com/in/nguyenvana
        portfolioUrl:
          type: string
          format: uri
          nullable: true
        certifications:
          type: array
          items:
            $ref: '#/components/schemas/Certification'
        portfolio:
          type: array
          items:
            $ref: '#/components/schemas/PortfolioItem'
        languages:
          type: array
          items:
            type: string
          example: [vi, en]
        category:
          $ref: '#/components/schemas/ExpertCategory'
        isAvailable:
          type: boolean
          example: true
        profilePictureUrl:
          type: string
          format: uri
          nullable: true
        profileStatus:
          $ref: '#/components/schemas/ExpertProfileStatus'
        totalEarnings:
          type: integer
          description: Lifetime earnings in VND (only visible to the expert themselves)
          example: 15000000
        pendingBalance:
          type: integer
          description: Unpaid balance in VND (only visible to the expert themselves)
          example: 2400000

    AvailabilitySlot:
      type: object
      required: [id, expertId, date, startTime, endTime, isBooked]
      properties:
        id:
          type: string
          example: slot_01HXYZ
        expertId:
          type: string
          example: exp_01HXYZ
        date:
          type: string
          format: date
          example: "2025-06-01"
        startTime:
          type: string
          pattern: '^([01]\d|2[0-3]):[0-5]\d$'
          example: "09:00"
        endTime:
          type: string
          pattern: '^([01]\d|2[0-3]):[0-5]\d$'
          example: "09:15"
        isBooked:
          type: boolean
          example: false

    BookingDocument:
      type: object
      required: [id, name, size, type, url]
      properties:
        id:
          type: string
          example: doc_01
        name:
          type: string
          example: CV_NguyenVanA.pdf
        size:
          type: integer
          description: File size in bytes
          example: 204800
        type:
          type: string
          example: application/pdf
        url:
          type: string
          format: uri
          example: https://storage.micromentor.vn/uploads/doc_01.pdf

    Booking:
      type: object
      required:
        - id
        - userId
        - expertId
        - slotIds
        - status
        - problemDescription
        - sessionGoals
        - scheduledAt
        - durationMinutes
        - priceVnd
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
          example: bkg_01HXYZ
        userId:
          type: string
          example: usr_01HXYZ
        expertId:
          type: string
          example: exp_01HXYZ
        slotIds:
          type: array
          items:
            type: string
          minItems: 2
          description: IDs of consecutive 15-min slots (2=30min, 4=60min, 6=90min)
          example: [slot_01, slot_02, slot_03, slot_04]
        status:
          $ref: '#/components/schemas/BookingStatus'
        problemDescription:
          type: string
          example: Tôi cần tư vấn về kiến trúc hệ thống cho startup của mình.
        sessionGoals:
          type: string
          example: Hiểu rõ các lựa chọn kiến trúc và trade-off cho hệ thống 100k MAU.
        documents:
          type: array
          items:
            $ref: '#/components/schemas/BookingDocument'
        scheduledAt:
          type: string
          format: date-time
          example: "2025-06-01T09:00:00Z"
        durationMinutes:
          $ref: '#/components/schemas/SessionDuration'
        priceVnd:
          type: integer
          example: 1200000
        paymentDeadline:
          type: string
          format: date-time
          nullable: true
          example: "2025-05-31T09:00:00Z"
        rejectionReason:
          type: string
          nullable: true
          example: null
        expertNote:
          type: string
          nullable: true
          example: null
        createdAt:
          type: string
          format: date-time
          example: "2025-05-28T10:00:00Z"
        updatedAt:
          type: string
          format: date-time
          example: "2025-05-28T10:00:00Z"
        user:
          $ref: '#/components/schemas/User'
        expert:
          $ref: '#/components/schemas/ExpertProfile'

    Payment:
      type: object
      required: [id, bookingId, userId, expertId, amount, status, createdAt]
      properties:
        id:
          type: string
          example: pay_01HXYZ
        bookingId:
          type: string
          example: bkg_01HXYZ
        userId:
          type: string
          example: usr_01HXYZ
        expertId:
          type: string
          example: exp_01HXYZ
        amount:
          type: integer
          description: Amount in VND
          example: 1200000
        status:
          $ref: '#/components/schemas/PaymentStatus'
        sepayQrCode:
          type: string
          nullable: true
          description: Base64-encoded QR code image for SEPay bank transfer
        bankAccount:
          type: object
          nullable: true
          properties:
            bankName:
              type: string
              example: Vietcombank
            accountNumber:
              type: string
              example: "1234567890"
            accountName:
              type: string
              example: CONG TY MICROMENTOR
        transferCode:
          type: string
          nullable: true
          description: Unique transfer reference code the user must include in their bank transfer
          example: MM1200000BKG01HXYZ
        paidAt:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time
          example: "2025-05-28T10:05:00Z"
        expiresAt:
          type: string
          format: date-time
          nullable: true
          example: "2025-05-29T10:05:00Z"

    Refund:
      type: object
      required: [id, bookingId, paymentId, userId, amount, reason, status, requestedAt]
      properties:
        id:
          type: string
          example: ref_01HXYZ
        bookingId:
          type: string
          example: bkg_01HXYZ
        paymentId:
          type: string
          example: pay_01HXYZ
        userId:
          type: string
          example: usr_01HXYZ
        amount:
          type: integer
          description: Refund amount in VND
          example: 600000
        reason:
          type: string
          example: Chuyên gia không tham gia buổi tư vấn.
        status:
          $ref: '#/components/schemas/RefundStatus'
        requestedAt:
          type: string
          format: date-time
          example: "2025-06-02T11:00:00Z"
        processedAt:
          type: string
          format: date-time
          nullable: true
        adminNote:
          type: string
          nullable: true
          example: null

    Review:
      type: object
      required: [id, bookingId, reviewerId, expertId, rating, comment, createdAt, isPublic]
      properties:
        id:
          type: string
          example: rev_01HXYZ
        bookingId:
          type: string
          example: bkg_01HXYZ
        reviewerId:
          type: string
          example: usr_01HXYZ
        expertId:
          type: string
          example: exp_01HXYZ
        rating:
          type: integer
          minimum: 1
          maximum: 5
          example: 5
        comment:
          type: string
          example: Buổi tư vấn rất hữu ích. Chuyên gia giải thích rõ ràng và đưa ra nhiều góc nhìn thực tế.
        createdAt:
          type: string
          format: date-time
          example: "2025-06-02T14:00:00Z"
        isPublic:
          type: boolean
          example: true
        reviewer:
          $ref: '#/components/schemas/User'

    Notification:
      type: object
      required: [id, userId, type, title, message, isRead, createdAt]
      properties:
        id:
          type: string
          example: notif_01HXYZ
        userId:
          type: string
          example: usr_01HXYZ
        type:
          $ref: '#/components/schemas/NotificationType'
        title:
          type: string
          example: Yêu cầu đặt lịch được chấp nhận
        message:
          type: string
          example: Chuyên gia Nguyễn Văn A đã chấp nhận yêu cầu tư vấn của bạn.
        isRead:
          type: boolean
          example: false
        createdAt:
          type: string
          format: date-time
          example: "2025-05-29T08:30:00Z"
        relatedBookingId:
          type: string
          nullable: true
          example: bkg_01HXYZ

    Payout:
      type: object
      required: [id, expertId, amount, status, requestedAt]
      properties:
        id:
          type: string
          example: pout_01HXYZ
        expertId:
          type: string
          example: exp_01HXYZ
        amount:
          type: integer
          description: Payout amount in VND
          example: 2400000
        status:
          $ref: '#/components/schemas/PayoutStatus'
        requestedAt:
          type: string
          format: date-time
          example: "2025-06-01T09:00:00Z"
        processedAt:
          type: string
          format: date-time
          nullable: true
        bankAccount:
          type: object
          required: [bankName, accountNumber, accountName]
          properties:
            bankName:
              type: string
              example: Vietcombank
            accountNumber:
              type: string
              example: "9876543210"
            accountName:
              type: string
              example: NGUYEN VAN A
        adminNote:
          type: string
          nullable: true

    ExpertApplication:
      type: object
      required:
        - id
        - userId
        - applicantName
        - applicantEmail
        - title
        - yearsOfExperience
        - skills
        - bio
        - category
        - pricePerSession
        - status
        - submittedAt
      properties:
        id:
          type: string
          example: app_01HXYZ
        userId:
          type: string
          example: usr_01HXYZ
        applicantName:
          type: string
          example: Nguyễn Văn A
        applicantEmail:
          type: string
          format: email
          example: nguyen.van.a@example.com
        applicantAvatar:
          type: string
          format: uri
          nullable: true
        title:
          type: string
          example: Senior Software Engineer
        company:
          type: string
          nullable: true
          example: Google Vietnam
        yearsOfExperience:
          type: integer
          minimum: 1
          maximum: 50
          example: 8
        skills:
          type: array
          items:
            type: string
          minItems: 1
          example: [React, Node.js, AWS]
        bio:
          type: string
          minLength: 100
          example: >
            Tôi là kỹ sư phần mềm với hơn 8 năm kinh nghiệm...
        category:
          $ref: '#/components/schemas/ExpertCategory'
        pricePerSession:
          type: integer
          minimum: 100000
          description: Price per 15-min slot in VND
          example: 200000
        linkedinUrl:
          type: string
          format: uri
          nullable: true
        portfolioUrl:
          type: string
          format: uri
          nullable: true
        certifications:
          type: array
          items:
            $ref: '#/components/schemas/Certification'
        status:
          $ref: '#/components/schemas/ExpertApplicationStatus'
        submittedAt:
          type: string
          format: date-time
          example: "2025-05-10T09:00:00Z"
        reviewedAt:
          type: string
          format: date-time
          nullable: true
        adminNote:
          type: string
          nullable: true

    AuditLogEntry:
      type: object
      required: [id, action, actorId, actorRole, targetType, targetId, createdAt]
      properties:
        id:
          type: string
          example: aud_01HXYZ
        action:
          $ref: '#/components/schemas/AuditAction'
        actorId:
          type: string
          description: ID of the user or admin who triggered the change
          example: adm_001
        actorRole:
          $ref: '#/components/schemas/UserRole'
        targetType:
          type: string
          enum: [Booking, Payment, ExpertApplication, Refund, ExpertProfile, User, Payout]
          example: Booking
        targetId:
          type: string
          example: bkg_01HXYZ
        previousState:
          type: object
          nullable: true
          additionalProperties: true
          example: {status: PENDING_APPROVAL}
        newState:
          type: object
          nullable: true
          additionalProperties: true
          example: {status: APPROVED_AWAITING_PAYMENT}
        note:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
          example: "2025-05-29T08:30:00Z"

    # ─────────────────────────────────────────────
    # PAGINATED LIST WRAPPERS
    # ─────────────────────────────────────────────
    UserListResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/User'
        pagination:
          $ref: '#/components/schemas/PaginationMeta'

    ExpertListResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/ExpertProfile'
        pagination:
          $ref: '#/components/schemas/PaginationMeta'

    BookingListResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Booking'
        pagination:
          $ref: '#/components/schemas/PaginationMeta'

    PaymentListResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Payment'
        pagination:
          $ref: '#/components/schemas/PaginationMeta'

    RefundListResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Refund'
        pagination:
          $ref: '#/components/schemas/PaginationMeta'

    ReviewListResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Review'
        pagination:
          $ref: '#/components/schemas/PaginationMeta'

    NotificationListResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Notification'
        pagination:
          $ref: '#/components/schemas/PaginationMeta'
        unreadCount:
          type: integer
          example: 3

    PayoutListResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Payout'
        pagination:
          $ref: '#/components/schemas/PaginationMeta'

    ApplicationListResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/ExpertApplication'
        pagination:
          $ref: '#/components/schemas/PaginationMeta'

    AuditLogListResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/AuditLogEntry'
        pagination:
          $ref: '#/components/schemas/PaginationMeta'

  # ─────────────────────────────────────────────
  # REUSABLE RESPONSES
  # ─────────────────────────────────────────────
  responses:
    Unauthorized:
      description: Missing or invalid Firebase ID token.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            code: UNAUTHORIZED
            message: Invalid or expired Firebase ID token.
    Forbidden:
      description: Authenticated user lacks the required role or ownership.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            code: FORBIDDEN
            message: You do not have permission to perform this action.
    NotFound:
      description: The requested resource was not found.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            code: NOT_FOUND
            message: Resource not found.
    ValidationError:
      description: Request body failed validation.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            code: VALIDATION_ERROR
            message: The request contains invalid data.
            details:
              bio: ["Ensure this field has at least 100 characters."]
    Conflict:
      description: The request conflicts with the current state of the resource.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            code: CONFLICT
            message: One or more selected slots are already booked.

# ═════════════════════════════════════════════════════════════════════════════
# PATHS
# ═════════════════════════════════════════════════════════════════════════════
paths:

  # ─────────────────────────────────────────────
  # AUTH
  # ─────────────────────────────────────────────
  /auth/sync:
    post:
      summary: Sync Firebase user with backend
      description: |
        Verifies the Firebase ID token, extracts claims (`uid`, `email`, `name`,
        `picture`), creates a local `User` record if it does not exist, updates
        basic profile fields if needed, and returns the full user profile with
        roles and onboarding state.

        Call this endpoint immediately after the user signs in or signs up via
        Firebase. The frontend should call `GET /auth/me` for subsequent profile
        reads.
      operationId: syncAuthUser
      tags: [Auth]
      security:
        - FirebaseAuth: []
      responses:
        '200':
          description: User synced successfully.
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    $ref: '#/components/schemas/User'
                  expertProfile:
                    $ref: '#/components/schemas/ExpertProfile'
                    nullable: true
                  expertApplication:
                    $ref: '#/components/schemas/ExpertApplication'
                    nullable: true
              example:
                user:
                  id: usr_01HXYZ
                  email: nguyen.van.a@example.com
                  fullName: Nguyễn Văn A
                  avatarUrl: null
                  roles: [USER]
                  profileCompleted: false
                  onboardingStep: 1
                  createdAt: "2025-05-14T08:00:00Z"
                  isActive: true
                expertProfile: null
                expertApplication: null
        '401':
          $ref: '#/components/responses/Unauthorized'

  /auth/me:
    get:
      summary: Get current user profile
      description: |
        Returns the authenticated user's full profile including roles,
        `profileCompleted`, `onboardingStep`, expert profile (if applicable),
        and active expert application (if applicable).
      operationId: getAuthMe
      tags: [Auth]
      security:
        - FirebaseAuth: []
      responses:
        '200':
          description: Current user profile.
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    $ref: '#/components/schemas/User'
                  expertProfile:
                    $ref: '#/components/schemas/ExpertProfile'
                    nullable: true
                  expertApplication:
                    $ref: '#/components/schemas/ExpertApplication'
                    nullable: true
        '401':
          $ref: '#/components/responses/Unauthorized'

  # ─────────────────────────────────────────────
  # ADMIN AUTH
  # ─────────────────────────────────────────────
  /admin/auth/sync:
    post:
      summary: Sync Firebase admin user with backend
      description: |
        Same flow as `POST /auth/sync` but creates or updates an `Admin` record
        instead of a regular `User` record. The Firebase token must carry an
        `admin: true` custom claim.
      operationId: syncAdminUser
      tags: [Admin Auth]
      security:
        - FirebaseAuth: []
      responses:
        '200':
          description: Admin synced successfully.
          content:
            application/json:
              schema:
                type: object
                properties:
                  admin:
                    $ref: '#/components/schemas/Admin'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /admin/auth/me:
    get:
      summary: Get current admin profile
      description: Returns the administrator profile and system-level information required by the admin dashboard.
      operationId: getAdminMe
      tags: [Admin Auth]
      security:
        - FirebaseAuth: []
      responses:
        '200':
          description: Admin profile.
          content:
            application/json:
              schema:
                type: object
                properties:
                  admin:
                    $ref: '#/components/schemas/Admin'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

    patch:
      summary: Update admin profile
      description: Update the administrator's own profile fields.
      operationId: updateAdminMe
      tags: [Admin Auth]
      security:
        - FirebaseAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                fullName:
                  type: string
                  example: Trưởng ban quản trị
                avatarUrl:
                  type: string
                  format: uri
      responses:
        '200':
          description: Updated admin profile.
          content:
            application/json:
              schema:
                type: object
                properties:
                  admin:
                    $ref: '#/components/schemas/Admin'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '422':
          $ref: '#/components/responses/ValidationError'

  # ─────────────────────────────────────────────
  # USERS
  # ─────────────────────────────────────────────
  /users/me:
    patch:
      summary: Update current user profile
      description: |
        Update the authenticated user's profile. Setting all required fields
        for the first time will flip `profileCompleted` to `true`.
      operationId: updateCurrentUser
      tags: [Users]
      security:
        - FirebaseAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                fullName:
                  type: string
                  example: Trần Thị B
                phone:
                  type: string
                  example: "0987654321"
            example:
              fullName: Trần Thị B
              phone: "0987654321"
      responses:
        '200':
          description: Updated user profile.
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    $ref: '#/components/schemas/User'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/ValidationError'

  /users/me/avatar:
    post:
      summary: Upload user avatar
      description: Upload a new avatar image for the current user. Returns the updated profile.
      operationId: uploadUserAvatar
      tags: [Users]
      security:
        - FirebaseAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [avatar]
              properties:
                avatar:
                  type: string
                  format: binary
                  description: Image file (JPEG, PNG, WebP), max 5 MB
      responses:
        '200':
          description: Avatar uploaded and profile updated.
          content:
            application/json:
              schema:
                type: object
                properties:
                  avatarUrl:
                    type: string
                    format: uri
                    example: https://storage.micromentor.vn/avatars/usr_01HXYZ.jpg
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/ValidationError'

  /users/me/notifications/preferences:
    patch:
      summary: Update notification preferences
      description: Enable or disable specific notification types for the current user.
      operationId: updateNotificationPreferences
      tags: [Users]
      security:
        - FirebaseAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                emailNotifications:
                  type: boolean
                  example: true
                pushNotifications:
                  type: boolean
                  example: false
                disabledTypes:
                  type: array
                  items:
                    $ref: '#/components/schemas/NotificationType'
                  example: [SESSION_REMINDER]
      responses:
        '200':
          description: Preferences updated.
        '401':
          $ref: '#/components/responses/Unauthorized'

  # ─────────────────────────────────────────────
  # EXPERTS (public discovery)
  # ─────────────────────────────────────────────
  /experts:
    get:
      summary: Search and list experts
      description: |
        Publicly accessible. Returns approved experts matching the given filters.
        Supports full-text search across name, title, bio, and skills.
      operationId: listExperts
      tags: [Experts]
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/PageSizeParam'
        - name: q
          in: query
          description: Full-text search query
          schema:
            type: string
            example: react
        - name: category
          in: query
          schema:
            $ref: '#/components/schemas/ExpertCategory'
        - name: minPrice
          in: query
          schema:
            type: integer
            example: 0
        - name: maxPrice
          in: query
          schema:
            type: integer
            example: 1000000
        - name: minRating
          in: query
          schema:
            type: number
            format: float
            example: 4.0
        - name: languages
          in: query
          schema:
            type: string
            description: Comma-separated language codes
            example: vi,en
        - name: sortBy
          in: query
          schema:
            type: string
            enum: [rating_desc, price_asc, price_desc, experience_desc, sessions_desc]
            default: rating_desc
      responses:
        '200':
          description: Paginated list of experts.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExpertListResponse'

  /experts/{expertId}:
    get:
      summary: Get expert public profile
      description: Returns the full public profile of an approved expert by ID or slug.
      operationId: getExpert
      tags: [Experts]
      parameters:
        - $ref: '#/components/parameters/ExpertIdPath'
      responses:
        '200':
          description: Expert profile.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExpertProfile'
        '404':
          $ref: '#/components/responses/NotFound'

  /experts/{expertId}/reviews:
    get:
      summary: Get reviews for an expert
      description: Returns paginated public reviews for the given expert.
      operationId: listExpertReviews
      tags: [Experts]
      parameters:
        - $ref: '#/components/parameters/ExpertIdPath'
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/PageSizeParam'
      responses:
        '200':
          description: Paginated reviews.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReviewListResponse'
        '404':
          $ref: '#/components/responses/NotFound'

  /experts/{expertId}/availability:
    get:
      summary: Get expert public availability
      description: Returns available (unbooked) slots for the given expert within a date range.
      operationId: getExpertPublicAvailability
      tags: [Experts]
      parameters:
        - $ref: '#/components/parameters/ExpertIdPath'
        - name: from
          in: query
          required: true
          schema:
            type: string
            format: date
            example: "2025-06-01"
        - name: to
          in: query
          required: true
          schema:
            type: string
            format: date
            example: "2025-06-30"
      responses:
        '200':
          description: Available slots grouped by date.
          content:
            application/json:
              schema:
                type: object
                properties:
                  slots:
                    type: array
                    items:
                      $ref: '#/components/schemas/AvailabilitySlot'
        '404':
          $ref: '#/components/responses/NotFound'

  # ─────────────────────────────────────────────
  # EXPERT APPLICATIONS
  # ─────────────────────────────────────────────
  /expert-applications:
    post:
      summary: Submit expert application
      description: |
        Allows an authenticated USER to apply to become an expert.
        A user may only have one active application at a time.
      operationId: submitExpertApplication
      tags: [Expert Applications]
      security:
        - FirebaseAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - title
                - yearsOfExperience
                - category
                - bio
                - pricePerSession
                - skills
              properties:
                title:
                  type: string
                  minLength: 3
                  example: Senior Software Engineer
                company:
                  type: string
                  nullable: true
                  example: Google Vietnam
                yearsOfExperience:
                  type: integer
                  minimum: 1
                  maximum: 50
                  example: 8
                category:
                  $ref: '#/components/schemas/ExpertCategory'
                bio:
                  type: string
                  minLength: 100
                  example: "Tôi là kỹ sư phần mềm với hơn 8 năm kinh nghiệm..."
                pricePerSession:
                  type: integer
                  minimum: 100000
                  example: 200000
                skills:
                  type: array
                  items:
                    type: string
                  minItems: 1
                  example: [React, Node.js, AWS]
                linkedinUrl:
                  type: string
                  format: uri
                  nullable: true
                portfolioUrl:
                  type: string
                  format: uri
                  nullable: true
                certifications:
                  type: array
                  items:
                    $ref: '#/components/schemas/Certification'
      responses:
        '201':
          description: Application submitted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExpertApplication'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/ValidationError'

  /expert-applications/me:
    get:
      summary: Get current user's expert application
      description: Returns the authenticated user's most recent expert application.
      operationId: getMyExpertApplication
      tags: [Expert Applications]
      security:
        - FirebaseAuth: []
      responses:
        '200':
          description: Expert application.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExpertApplication'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

    patch:
      summary: Update expert application
      description: |
        Update a `NEEDS_REVISION` application with revised information.
        Only allowed when status is `NEEDS_REVISION`.
      operationId: updateMyExpertApplication
      tags: [Expert Applications]
      security:
        - FirebaseAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                title:
                  type: string
                bio:
                  type: string
                  minLength: 100
                skills:
                  type: array
                  items:
                    type: string
                pricePerSession:
                  type: integer
                  minimum: 100000
                certifications:
                  type: array
                  items:
                    $ref: '#/components/schemas/Certification'
      responses:
        '200':
          description: Application updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExpertApplication'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/ValidationError'

    delete:
      summary: Withdraw expert application
      description: Withdraw a `PENDING_REVIEW` application. Cannot be undone.
      operationId: withdrawMyExpertApplication
      tags: [Expert Applications]
      security:
        - FirebaseAuth: []
      responses:
        '204':
          description: Application withdrawn.
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          $ref: '#/components/responses/Conflict'

  # ─────────────────────────────────────────────
  # EXPERT PROFILE MANAGEMENT (own profile)
  # ─────────────────────────────────────────────
  /expert/profile:
    get:
      summary: Get current expert's own profile
      description: Returns the full expert profile including private fields (earnings, balance).
      operationId: getMyExpertProfile
      tags: [Expert Profile]
      security:
        - FirebaseAuth: []
      responses:
        '200':
          description: Expert profile.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExpertProfile'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

    patch:
      summary: Update expert profile
      description: |
        Update the expert's own profile. Significant changes (bio, title, pricing)
        will set `profileStatus` to `PENDING_REVIEW` until an admin approves them.
      operationId: updateMyExpertProfile
      tags: [Expert Profile]
      security:
        - FirebaseAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                displayName:
                  type: string
                title:
                  type: string
                company:
                  type: string
                  nullable: true
                bio:
                  type: string
                  minLength: 100
                skills:
                  type: array
                  items:
                    type: string
                pricePerSession:
                  type: integer
                  minimum: 100000
                sessionDurationMinutes:
                  $ref: '#/components/schemas/SessionDuration'
                languages:
                  type: array
                  items:
                    type: string
                isAvailable:
                  type: boolean
                linkedinUrl:
                  type: string
                  format: uri
                  nullable: true
      responses:
        '200':
          description: Updated expert profile.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExpertProfile'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '422':
          $ref: '#/components/responses/ValidationError'

  /expert/profile/portfolio:
    post:
      summary: Add portfolio item
      description: Add a new portfolio item to the expert's profile.
      operationId: addPortfolioItem
      tags: [Expert Profile]
      security:
        - FirebaseAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [title, description]
              properties:
                title:
                  type: string
                description:
                  type: string
                url:
                  type: string
                  format: uri
                  nullable: true
                imageUrl:
                  type: string
                  format: uri
                  nullable: true
      responses:
        '201':
          description: Portfolio item added.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PortfolioItem'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /expert/profile/portfolio/{itemId}:
    patch:
      summary: Update portfolio item
      operationId: updatePortfolioItem
      tags: [Expert Profile]
      security:
        - FirebaseAuth: []
      parameters:
        - $ref: '#/components/parameters/PortfolioItemIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                title:
                  type: string
                description:
                  type: string
                url:
                  type: string
                  format: uri
                  nullable: true
      responses:
        '200':
          description: Portfolio item updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PortfolioItem'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

    delete:
      summary: Delete portfolio item
      operationId: deletePortfolioItem
      tags: [Expert Profile]
      security:
        - FirebaseAuth: []
      parameters:
        - $ref: '#/components/parameters/PortfolioItemIdPath'
      responses:
        '204':
          description: Portfolio item deleted.
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /expert/profile/certifications:
    post:
      summary: Add certification
      operationId: addCertification
      tags: [Expert Profile]
      security:
        - FirebaseAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, issuer, year]
              properties:
                name:
                  type: string
                issuer:
                  type: string
                year:
                  type: integer
                url:
                  type: string
                  format: uri
                  nullable: true
      responses:
        '201':
          description: Certification added.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Certification'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /expert/profile/certifications/{certId}:
    delete:
      summary: Delete certification
      operationId: deleteCertification
      tags: [Expert Profile]
      security:
        - FirebaseAuth: []
      parameters:
        - $ref: '#/components/parameters/CertificationIdPath'
      responses:
        '204':
          description: Certification deleted.
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  # ─────────────────────────────────────────────
  # AVAILABILITY
  # ─────────────────────────────────────────────
  /expert/availability:
    get:
      summary: Get own availability slots
      description: Returns all slots (booked and available) for the authenticated expert.
      operationId: getMyAvailability
      tags: [Availability]
      security:
        - FirebaseAuth: []
      parameters:
        - name: from
          in: query
          required: true
          schema:
            type: string
            format: date
            example: "2025-06-01"
        - name: to
          in: query
          required: true
          schema:
            type: string
            format: date
            example: "2025-06-30"
      responses:
        '200':
          description: Availability slots.
          content:
            application/json:
              schema:
                type: object
                properties:
                  slots:
                    type: array
                    items:
                      $ref: '#/components/schemas/AvailabilitySlot'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

    post:
      summary: Create availability slots
      description: |
        Create one or more 15-minute availability slots. Each slot must have a
        unique `(expertId, date, startTime)` combination.
      operationId: createAvailabilitySlots
      tags: [Availability]
      security:
        - FirebaseAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [slots]
              properties:
                slots:
                  type: array
                  minItems: 1
                  items:
                    type: object
                    required: [date, startTime]
                    properties:
                      date:
                        type: string
                        format: date
                        example: "2025-06-01"
                      startTime:
                        type: string
                        pattern: '^([01]\d|2[0-3]):[0-5]\d$'
                        example: "09:00"
      responses:
        '201':
          description: Slots created.
          content:
            application/json:
              schema:
                type: object
                properties:
                  slots:
                    type: array
                    items:
                      $ref: '#/components/schemas/AvailabilitySlot'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/Conflict'

  /expert/availability/{slotId}:
    patch:
      summary: Update availability slot
      description: Update metadata on a slot. Cannot modify a slot that is already booked.
      operationId: updateAvailabilitySlot
      tags: [Availability]
      security:
        - FirebaseAuth: []
      parameters:
        - $ref: '#/components/parameters/SlotIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                date:
                  type: string
                  format: date
                startTime:
                  type: string
                  pattern: '^([01]\d|2[0-3]):[0-5]\d$'
      responses:
        '200':
          description: Slot updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AvailabilitySlot'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'

    delete:
      summary: Delete availability slot
      description: Delete a slot. Cannot delete a booked slot.
      operationId: deleteAvailabilitySlot
      tags: [Availability]
      security:
        - FirebaseAuth: []
      parameters:
        - $ref: '#/components/parameters/SlotIdPath'
      responses:
        '204':
          description: Slot deleted.
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'

  # ─────────────────────────────────────────────
  # BOOKINGS
  # ─────────────────────────────────────────────
  /bookings:
    get:
      summary: List bookings for current user
      description: |
        Returns bookings where the current user is either the requester or the expert.
        Use the `role` parameter to filter.
      operationId: listMyBookings
      tags: [Bookings]
      security:
        - FirebaseAuth: []
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/PageSizeParam'
        - name: role
          in: query
          description: Filter by the current user's role in the booking
          schema:
            type: string
            enum: [user, expert]
        - name: status
          in: query
          schema:
            $ref: '#/components/schemas/BookingStatus'
      responses:
        '200':
          description: Paginated bookings.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BookingListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

    post:
      summary: Create booking request
      description: |
        Create a new booking request for a consultation. Locks the selected slots
        and sets booking status to `PENDING_APPROVAL`. The expert has 24 hours
        to respond.
      operationId: createBooking
      tags: [Bookings]
      security:
        - FirebaseAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - expertId
                - slotIds
                - problemDescription
                - sessionGoals
              properties:
                expertId:
                  type: string
                  example: exp_01HXYZ
                slotIds:
                  type: array
                  items:
                    type: string
                  minItems: 2
                  description: "Must be 2, 4, or 6 consecutive 15-min slot IDs"
                  example: [slot_01, slot_02, slot_03, slot_04]
                problemDescription:
                  type: string
                  example: Tôi cần tư vấn về kiến trúc hệ thống cho startup của mình.
                sessionGoals:
                  type: string
                  example: Hiểu rõ trade-off giữa monolith và microservices cho MVP.
                documentUrls:
                  type: array
                  items:
                    type: string
                    format: uri
                  description: URLs from a prior file upload confirmation
      responses:
        '201':
          description: Booking created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Booking'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/ValidationError'

  /bookings/{bookingId}:
    get:
      summary: Get booking details
      description: Returns full booking details. Only accessible by the booking's user, expert, or an admin.
      operationId: getBooking
      tags: [Bookings]
      security:
        - FirebaseAuth: []
      parameters:
        - $ref: '#/components/parameters/BookingIdPath'
      responses:
        '200':
          description: Booking details.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Booking'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /bookings/{bookingId}/approve:
    post:
      summary: Approve booking request
      description: |
        Expert approves the booking. Transitions status to
        `APPROVED_AWAITING_PAYMENT`. The user has 24 hours (or until session
        start, whichever is sooner) to complete payment.
      operationId: approveBooking
      tags: [Bookings]
      security:
        - FirebaseAuth: []
      parameters:
        - $ref: '#/components/parameters/BookingIdPath'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                expertNote:
                  type: string
                  example: Tôi sẵn sàng. Hãy chuẩn bị sơ đồ kiến trúc hiện tại.
      responses:
        '200':
          description: Booking approved.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Booking'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'

  /bookings/{bookingId}/reject:
    post:
      summary: Reject booking request
      description: Expert rejects the booking. Transitions status to `REJECTED`.
      operationId: rejectBooking
      tags: [Bookings]
      security:
        - FirebaseAuth: []
      parameters:
        - $ref: '#/components/parameters/BookingIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [rejectionReason]
              properties:
                rejectionReason:
                  type: string
                  example: Lịch của tôi bị trùng. Xin lỗi vì sự bất tiện này.
      responses:
        '200':
          description: Booking rejected.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Booking'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'

  /bookings/{bookingId}/cancel:
    post:
      summary: Cancel booking
      description: |
        User or expert cancels the booking. Status becomes `CANCELLED_BY_USER`
        or `CANCELLED_BY_EXPERT`. Refund eligibility:
        - User cancels ≥ 72 h before session → 50% refund.
        - Expert cancels → 100% refund.
      operationId: cancelBooking
      tags: [Bookings]
      security:
        - FirebaseAuth: []
      parameters:
        - $ref: '#/components/parameters/BookingIdPath'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                reason:
                  type: string
      responses:
        '200':
          description: Booking cancelled.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Booking'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'

  /bookings/{bookingId}/complete:
    post:
      summary: Mark booking as completed
      description: |
        Mark a booking as completed. Typically triggered automatically when the
        session window ends, but can be called explicitly by the expert.
        Transitions `IN_PROGRESS` → `COMPLETED`.
      operationId: completeBooking
      tags: [Bookings]
      security:
        - FirebaseAuth: []
      parameters:
        - $ref: '#/components/parameters/BookingIdPath'
      responses:
        '200':
          description: Booking completed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Booking'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'

  /bookings/{bookingId}/session-token:
    post:
      summary: Join consultation session — get Agora token
      description: |
        Generates and returns an Agora RTC token for the consultation room
        associated with this booking. Only callable by the booking's user or
        expert during the `IN_PROGRESS` window.
      operationId: getSessionToken
      tags: [Bookings]
      security:
        - FirebaseAuth: []
      parameters:
        - $ref: '#/components/parameters/BookingIdPath'
      responses:
        '200':
          description: Agora RTC credentials.
          content:
            application/json:
              schema:
                type: object
                required: [token, channel, uid, appId]
                properties:
                  token:
                    type: string
                    description: Agora RTC token
                  channel:
                    type: string
                    description: Agora channel name (derived from bookingId)
                    example: bkg_01HXYZ
                  uid:
                    type: integer
                    description: Agora UID for this participant
                    example: 1001
                  appId:
                    type: string
                    description: Agora App ID
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'

  # ─────────────────────────────────────────────
  # FILE UPLOADS
  # ─────────────────────────────────────────────
  /uploads/presigned-url:
    post:
      summary: Generate Azure Blob Storage presigned upload URL
      description: |
        Returns a short-lived presigned URL for the client to upload a file
        directly to Azure Blob Storage. After the upload is complete, call
        `POST /uploads/confirm` to register the file in the backend.
      operationId: generatePresignedUrl
      tags: [File Uploads]
      security:
        - FirebaseAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [filename, contentType, purpose]
              properties:
                filename:
                  type: string
                  example: architecture-diagram.png
                contentType:
                  type: string
                  example: image/png
                purpose:
                  type: string
                  enum: [booking_document, expert_certificate, avatar]
                  example: booking_document
                sizeBytes:
                  type: integer
                  description: Expected file size for server-side validation
                  example: 204800
      responses:
        '200':
          description: Presigned upload URL.
          content:
            application/json:
              schema:
                type: object
                required: [uploadUrl, fileId, expiresAt]
                properties:
                  uploadUrl:
                    type: string
                    format: uri
                  fileId:
                    type: string
                    description: Reference ID to use in the confirm call
                    example: file_01HXYZ
                  expiresAt:
                    type: string
                    format: date-time
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/ValidationError'

  /uploads/confirm:
    post:
      summary: Confirm file upload
      description: Register a successfully uploaded file in the backend after the direct-to-blob upload completes.
      operationId: confirmUpload
      tags: [File Uploads]
      security:
        - FirebaseAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [fileId]
              properties:
                fileId:
                  type: string
                  example: file_01HXYZ
      responses:
        '200':
          description: File confirmed.
          content:
            application/json:
              schema:
                type: object
                properties:
                  fileId:
                    type: string
                  url:
                    type: string
                    format: uri
                  name:
                    type: string
                  size:
                    type: integer
                  contentType:
                    type: string
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /uploads/{fileId}:
    delete:
      summary: Delete uploaded file
      description: Delete a file that has not yet been attached to a booking.
      operationId: deleteUpload
      tags: [File Uploads]
      security:
        - FirebaseAuth: []
      parameters:
        - name: fileId
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: File deleted.
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  # ─────────────────────────────────────────────
  # PAYMENTS
  # ─────────────────────────────────────────────
  /payments:
    get:
      summary: List current user's payments
      description: Returns paginated payment history for the authenticated user.
      operationId: listMyPayments
      tags: [Payments]
      security:
        - FirebaseAuth: []
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/PageSizeParam'
        - name: status
          in: query
          schema:
            $ref: '#/components/schemas/PaymentStatus'
      responses:
        '200':
          description: Paginated payments.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /payments/bookings/{bookingId}:
    post:
      summary: Create SEPay payment order for a booking
      description: |
        Creates a SEPay payment order for an `APPROVED_AWAITING_PAYMENT` booking.
        Returns bank transfer details and a QR code image. The backend awaits the
        SEPay webhook to confirm payment.
      operationId: createPaymentOrder
      tags: [Payments]
      security:
        - FirebaseAuth: []
      parameters:
        - $ref: '#/components/parameters/BookingIdPath'
      responses:
        '201':
          description: Payment order created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Payment'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'

  /payments/{paymentId}:
    get:
      summary: Get payment details
      description: Returns payment details. Only accessible by the payment owner or an admin.
      operationId: getPayment
      tags: [Payments]
      security:
        - FirebaseAuth: []
      parameters:
        - $ref: '#/components/parameters/PaymentIdPath'
      responses:
        '200':
          description: Payment details.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Payment'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /payments/webhook/sepay:
    post:
      summary: SEPay payment webhook
      description: |
        Receives incoming webhook notifications from SEPay when a bank transfer
        is confirmed. Validates the transfer code, marks the payment as `PAID`,
        and transitions the booking to `PAID_CONFIRMED`.

        **This endpoint does not require Firebase authentication.** It is secured
        via an HMAC signature in the `X-SEPay-Signature` header.
      operationId: handleSepayWebhook
      tags: [Payments]
      security: []
      parameters:
        - name: X-SEPay-Signature
          in: header
          required: true
          schema:
            type: string
          description: HMAC-SHA256 signature for payload verification
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              description: SEPay webhook payload (structure defined by SEPay)
              additionalProperties: true
      responses:
        '200':
          description: Webhook processed successfully.
        '400':
          description: Invalid signature or payload.

  # ─────────────────────────────────────────────
  # REFUNDS
  # ─────────────────────────────────────────────
  /refunds/bookings/{bookingId}:
    get:
      summary: Get refund for a booking
      description: Returns refund details for the given booking (if one exists).
      operationId: getRefundByBooking
      tags: [Refunds]
      security:
        - FirebaseAuth: []
      parameters:
        - $ref: '#/components/parameters/BookingIdPath'
      responses:
        '200':
          description: Refund details.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Refund'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  # ─────────────────────────────────────────────
  # REVIEWS
  # ─────────────────────────────────────────────
  /reviews:
    post:
      summary: Create a review
      description: |
        Submit a review for a completed booking. Reviews can only be submitted
        within 7 days of session completion. Each booking can have at most one
        review.
      operationId: createReview
      tags: [Reviews]
      security:
        - FirebaseAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [bookingId, rating, comment]
              properties:
                bookingId:
                  type: string
                  example: bkg_01HXYZ
                rating:
                  type: integer
                  minimum: 1
                  maximum: 5
                  example: 5
                comment:
                  type: string
                  example: Buổi tư vấn rất hữu ích!
                isPublic:
                  type: boolean
                  default: true
      responses:
        '201':
          description: Review submitted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Review'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/ValidationError'

  # ─────────────────────────────────────────────
  # NOTIFICATIONS
  # ─────────────────────────────────────────────
  /notifications:
    get:
      summary: List notifications
      description: Returns paginated notifications for the current user.
      operationId: listNotifications
      tags: [Notifications]
      security:
        - FirebaseAuth: []
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/PageSizeParam'
        - name: isRead
          in: query
          schema:
            type: boolean
      responses:
        '200':
          description: Paginated notifications with unread count.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotificationListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /notifications/{notificationId}/read:
    post:
      summary: Mark notification as read
      operationId: markNotificationRead
      tags: [Notifications]
      security:
        - FirebaseAuth: []
      parameters:
        - $ref: '#/components/parameters/NotificationIdPath'
      responses:
        '200':
          description: Notification marked as read.
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /notifications/read-all:
    post:
      summary: Mark all notifications as read
      operationId: markAllNotificationsRead
      tags: [Notifications]
      security:
        - FirebaseAuth: []
      responses:
        '200':
          description: All notifications marked as read.
        '401':
          $ref: '#/components/responses/Unauthorized'

  # ─────────────────────────────────────────────
  # PAYOUTS
  # ─────────────────────────────────────────────
  /expert/payouts:
    get:
      summary: List expert payout history
      description: Returns paginated payout history for the authenticated expert.
      operationId: listMyPayouts
      tags: [Payouts]
      security:
        - FirebaseAuth: []
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/PageSizeParam'
      responses:
        '200':
          description: Paginated payouts.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PayoutListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

    post:
      summary: Request payout
      description: |
        Expert requests a payout for their pending balance. Creates a `PENDING`
        payout for admin processing.
      operationId: requestPayout
      tags: [Payouts]
      security:
        - FirebaseAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [amount, bankAccount]
              properties:
                amount:
                  type: integer
                  description: Amount in VND to withdraw (must not exceed pendingBalance)
                  example: 2400000
                bankAccount:
                  type: object
                  required: [bankName, accountNumber, accountName]
                  properties:
                    bankName:
                      type: string
                      example: Vietcombank
                    accountNumber:
                      type: string
                      example: "9876543210"
                    accountName:
                      type: string
                      example: NGUYEN VAN A
      responses:
        '201':
          description: Payout request created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Payout'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '422':
          $ref: '#/components/responses/ValidationError'

  /expert/payouts/summary:
    get:
      summary: Get expert earnings summary
      description: Returns total earnings, pending balance, and processed payout total.
      operationId: getPayoutSummary
      tags: [Payouts]
      security:
        - FirebaseAuth: []
      responses:
        '200':
          description: Earnings summary.
          content:
            application/json:
              schema:
                type: object
                required: [totalEarnings, pendingBalance, totalPaidOut]
                properties:
                  totalEarnings:
                    type: integer
                    example: 15000000
                  pendingBalance:
                    type: integer
                    example: 2400000
                  totalPaidOut:
                    type: integer
                    example: 12600000
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  # ═════════════════════════════════════════════
  # ADMIN PATHS
  # ═════════════════════════════════════════════

  /admin/dashboard:
    get:
      summary: Get admin dashboard metrics
      description: Returns platform-wide KPIs for the admin dashboard.
      operationId: getAdminDashboard
      tags: [Admin Dashboard]
      security:
        - FirebaseAuth: []
      parameters:
        - name: from
          in: query
          schema:
            type: string
            format: date
            example: "2025-01-01"
        - name: to
          in: query
          schema:
            type: string
            format: date
            example: "2025-05-31"
