openapi: 3.0.3
info:
  title: MicroMentor API
  version: 1.0.0
  description: |
    REST API for the MicroMentor frontend. Covers authentication, user and expert
    management, availability, bookings, payments (SEPay), refunds, reviews, files,
    notifications, payouts and admin operations. Implements business rules such as
    15-minute availability slots, 24-hour approval/payment windows, and auditability.
  contact:
    name: MicroMentor API Team
    email: devops@micromentor.example.com
servers:
  - url: https://api.example.com
    description: Production server (replace with real URL)
  - url: http://localhost:8000
    description: Local development server
tags:
  - name: Auth
    description: Authentication and session management
  - name: Users
    description: User profile and preferences
  - name: Experts
    description: Expert discovery, applications and profile management
  - name: Availability
    description: Expert availability slots and public schedules
  
  - name: Bookings
    description: Booking lifecycle and consultation sessions
  - name: Files
    description: File upload helpers
  - name: Payments
    description: SEPay payment flows and webhooks
  - name: Refunds
    description: Refund requests and processing
  - name: Reviews
    description: User reviews for experts
  - name: Notifications
    description: User notifications
  - name: Payouts
    description: Expert payout history and summary
  - name: Admin
    description: Administrative endpoints and metrics
security:
  - bearerAuth: []


components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    PageParam:
      name: page
      in: query
      description: Page number (1-based)
      required: false
      schema:
        type: integer
        minimum: 1
        default: 1
    PerPageParam:
      name: per_page
      in: query
      description: Items per page
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
    SortParam:
      name: sort
      in: query
      description: Sort expression, e.g. `created_at` or `price`
      required: false
      schema:
        type: string
    DateFrom:
      name: from
      in: query
      description: ISO 8601 start date/time filter
      required: false
      schema:
        type: string
        format: date-time
    DateTo:
      name: to
      in: query
      description: ISO 8601 end date/time filter
      required: false
      schema:
        type: string
        format: date-time

  schemas:
    ErrorResponse:
      type: object
      properties:
        code:
          type: string
          example: VALIDATION_ERROR
        message:
          type: string
          example: The request contains invalid data.
        details:
          type: object
          additionalProperties:
            type: array
            items:
              type: string

    PageMeta:
      type: object
      properties:
        page:
          type: integer
          example: 1
        per_page:
          type: integer
          example: 20
        total:
          type: integer
          example: 123

    PaginatedResponse:
      type: object
      properties:
        meta:
          $ref: '#/components/schemas/PageMeta'
        items:
          type: array
          items:
            type: object

    AuthTokens:
      type: object
      properties:
        access:
          type: string
          description: Short-lived JWT access token
        refresh:
          type: string
          description: Long-lived refresh token
      example:
        access: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
        refresh: d1f2a3b4-5678-90ab-cdef-111213141516

    RegisterRequest:
      type: object
      required: [email, password, first_name, last_name]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
        first_name:
          type: string
        last_name:
          type: string
      example:
        email: alice@example.com
        password: StrongP@ssw0rd
        first_name: Alice
        last_name: Johnson

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
      example:
        email: alice@example.com
        password: StrongP@ssw0rd

    ForgotPasswordRequest:
      type: object
      required: [email]
      properties:
        email:
          type: string
          format: email
      example:
        email: alice@example.com

    ResetPasswordRequest:
      type: object
      required: [token, password]
      properties:
        token:
          type: string
        password:
          type: string
      example:
        token: reset-token-123
        password: NewStrongP@ss

    User:
      type: object
      properties:
        id:
          type: integer
          example: 42
        email:
          type: string
          format: email
          example: alice@example.com
        first_name:
          type: string
          example: Alice
        last_name:
          type: string
          example: Johnson
        role:
          type: string
          enum: [user, expert, admin]
          example: user
        avatar_url:
          type: string
          format: uri
        created_at:
          type: string
          format: date-time

    ProfileUpdate:
      type: object
      properties:
        first_name:
          type: string
        last_name:
          type: string
        bio:
          type: string
        location:
          type: string
      example:
        first_name: Alice
        last_name: Johnson
        bio: Senior product designer available for 1:1 calls
        location: Hanoi, Vietnam

    ChangePasswordRequest:
      type: object
      required: [current_password, new_password]
      properties:
        current_password:
          type: string
        new_password:
          type: string
      example:
        current_password: OldP@ss123
        new_password: NewP@ss456

    ExpertSummary:
      type: object
      properties:
        id:
          type: integer
          example: 11
        slug:
          type: string
          example: jane-doe-ux
        display_name:
          type: string
          example: Jane Doe
        headline:
          type: string
          example: UX Designer, 10y
        rating:
          type: number
          format: float
          example: 4.8
        price_per_session:
          type: integer
          description: Price per 15-minute slot in cents
          example: 2500

    ExpertDetail:
      allOf:
        - $ref: '#/components/schemas/ExpertSummary'
        - type: object
          properties:
            bio:
              type: string
            specialties:
              type: array
              items:
                type: string
            portfolio:
              type: array
              items:
                type: object
            certifications:
              type: array
              items:
                type: object

    AvailabilitySlot:
      type: object
      properties:
        id:
          type: integer
          example: 987
        expert_id:
          type: integer
        start_time:
          type: string
          format: date-time
          example: '2026-06-01T09:00:00Z'
        end_time:
          type: string
          format: date-time
          example: '2026-06-01T09:15:00Z'
        is_booked:
          type: boolean
          example: false
      description: |
        Each slot is exactly 15 minutes long. start_time + 15min == end_time.

    BookingRequest:
      type: object
      required: [expert_id, slots]
      properties:
        expert_id:
          type: integer
        slots:
          type: array
          description: Array of ISO datetimes or availability slot ids (prefer slot ids)
          items:
            anyOf:
              - type: integer
              - type: string
        note:
          type: string
      example:
        expert_id: 11
        slots: [987, 988]
        note: I would like feedback on my portfolio

    Booking:
      type: object
      properties:
        id:
          type: integer
          example: 555
        user_id:
          type: integer
        expert_id:
          type: integer
        slots:
          type: array
          items:
            $ref: '#/components/schemas/AvailabilitySlot'
        status:
          type: string
          enum: [DRAFT, PENDING_APPROVAL, REJECTED, APPROVED_AWAITING_PAYMENT, EXPIRED_UNPAID, PAID_CONFIRMED, IN_PROGRESS, COMPLETED, CANCELLED_BY_USER, CANCELLED_BY_EXPERT, NO_SHOW_USER, NO_SHOW_EXPERT, REFUND_PENDING, REFUNDED]
          example: PENDING_APPROVAL
        total_price_cents:
          type: integer
          example: 5000
        created_at:
          type: string
          format: date-time

    FileUploadRequest:
      type: object
      required: [filename, content_type, purpose]
      properties:
        filename:
          type: string
        content_type:
          type: string
          example: application/pdf
        purpose:
          type: string
          description: e.g. avatar, resume, portfolio
      example:
        filename: resume.pdf
        content_type: application/pdf
        purpose: resume

    FileUploadResponse:
      type: object
      properties:
        file_id:
          type: string
          example: file_abc123
        upload_url:
          type: string
          format: uri
        expires_in_seconds:
          type: integer
          example: 3600

    PaymentOrderRequest:
      type: object
      required: [booking_id, amount_cents, return_url]
      properties:
        booking_id:
          type: integer
        amount_cents:
          type: integer
        return_url:
          type: string
          format: uri
      example:
        booking_id: 555
        amount_cents: 5000
        return_url: https://frontend.example.com/payment/return

    PaymentOrder:
      type: object
      properties:
        id:
          type: integer
        provider:
          type: string
          example: sepay
        provider_reference:
          type: string
        amount_cents:
          type: integer
        status:
          type: string
          enum: [PENDING, PAID, FAILED]
      example:
        id: 901
        provider: sepay
        provider_reference: order_abcdef
        amount_cents: 5000
        status: PENDING

    RefundRequest:
      type: object
      required: [booking_id, reason]
      properties:
        booking_id:
          type: integer
        reason:
          type: string
      example:
        booking_id: 555
        reason: Expert did not join the session

    ReviewRequest:
      type: object
      required: [booking_id, rating, text]
      properties:
        booking_id:
          type: integer
        rating:
          type: integer
          minimum: 1
          maximum: 5
        text:
          type: string
      example:
        booking_id: 555
        rating: 5
        text: Great advice — very actionable

    Notification:
      type: object
      properties:
        id:
          type: integer
        user_id:
          type: integer
        title:
          type: string
        body:
          type: string
        read:
          type: boolean
        created_at:
          type: string
          format: date-time

    Payout:
      type: object
      properties:
        id:
          type: integer
        expert_id:
          type: integer
        amount_cents:
          type: integer
        paid_at:
          type: string
          format: date-time

    AdminMetrics:
      type: object
      properties:
        total_users:
          type: integer
        total_experts:
          type: integer
        total_bookings:
          type: integer
        revenue_cents:
          type: integer

    AdminLoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
      example:
        email: admin@micromentor.com
        password: StrongAdminP@ss

    AdminProfile:
      type: object
      properties:
        id:
          type: string
          example: admin_001
        fullName:
          type: string
          example: System Administrator
        email:
          type: string
          format: email
          example: admin@micrommentor.com
        roles:
          type: array
          items:
            type: string
          example: [ADMIN]

    AdminLoginResponse:
      type: object
      properties:
        accessToken:
          type: string
        refreshToken:
          type: string
        admin:
          $ref: '#/components/schemas/AdminProfile'
      example:
        accessToken: jwt_access_token
        refreshToken: jwt_refresh_token
        admin:
          id: admin_001
          fullName: System Administrator
          email: admin@micrommentor.com
          roles: [ADMIN]

    PaymentStatus:
      type: string
      enum: [PENDING, PAID, REFUNDED, FAILED, EXPIRED, CANCELLED]
      example: PAID

    PaginationMeta:
      type: object
      properties:
        page:
          type: integer
          example: 1
        pageSize:
          type: integer
          example: 10
        totalItems:
          type: integer
          example: 7
        totalPages:
          type: integer
          example: 1

    AdminPaymentSummary:
      type: object
      properties:
        currency:
          type: string
          example: VND
        totalCollected:
          type: integer
          example: 3700000
        pendingAmount:
          type: integer
          example: 800000
        refundedAmount:
          type: integer
          example: 600000
        successfulPaymentCount:
          type: integer
          example: 4
        pendingPaymentCount:
          type: integer
          example: 1
        refundedPaymentCount:
          type: integer
          example: 1

    AdminUserSummary:
      type: object
      properties:
        id:
          type: string
        fullName:
          type: string
      example:
        id: usr_001
        fullName: Nguyễn Thị Mai

    AdminExpertSummary:
      type: object
      properties:
        id:
          type: string
        fullName:
          type: string
      example:
        id: exp_001
        fullName: Nguyễn Minh Đức

    AdminPayment:
      type: object
      properties:
        id:
          type: string
          example: pay_001
        paymentDate:
          type: string
          format: date-time
          example: '2026-05-10T09:30:00Z'
        user:
          $ref: '#/components/schemas/AdminUserSummary'
        expert:
          $ref: '#/components/schemas/AdminExpertSummary'
        bookingId:
          type: string
          example: bkg_001
        amount:
          type: integer
          example: 800000
        currency:
          type: string
          example: VND
        transactionCode:
          type: string
          example: MM240510001
        status:
          $ref: '#/components/schemas/PaymentStatus'

    AuditLogEntry:
      type: object
      properties:
        id:
          type: string
        action:
          type: string
        performed_by:
          type: string
        performed_at:
          type: string
          format: date-time
        meta:
          type: object
      example:
        id: audit_100
        action: payment.refund.created
        performed_by: admin_001
        performed_at: '2026-05-12T15:00:00Z'
        meta:
          reason: Expert did not attend

    AdminRefund:
      type: object
      required: [amount, reason]
      properties:
        amount:
          type: integer
          example: 600000
        reason:
          type: string
          example: Expert did not attend the consultation session.
      example:
        amount: 600000
        reason: Expert did not attend the consultation session.

    AdminPaymentDetail:
      type: object
      properties:
        payment:
          $ref: '#/components/schemas/AdminPayment'
        booking:
          type: object
          description: Booking info related to payment
        refunds:
          type: array
          items:
            $ref: '#/components/schemas/AdminRefund'
        audit_log:
          type: array
          items:
            $ref: '#/components/schemas/AuditLogEntry'
      example:
        payment:
          id: pay_001
          paymentDate: '2026-05-10T09:30:00Z'
          user:
            id: usr_001
            fullName: Nguyễn Thị Mai
          expert:
            id: exp_001
            fullName: Nguyễn Minh Đức
          bookingId: bkg_001
          amount: 800000
          currency: VND
          transactionCode: MM240510001
          status: PAID
        booking:
          id: bkg_001
          slots: []
        refunds:
          - amount: 600000
            reason: Expert did not attend the consultation session.
        audit_log:
          - id: audit_100
            action: payment.refund.created
            performed_by: admin_001
            performed_at: '2026-05-12T15:00:00Z'
            meta:
              reason: Expert did not attend

  responses:
    Unauthorized:
      description: Authentication required or token invalid
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            token:
              value:
                code: AUTH_ERROR
                message: Missing or invalid authentication token
    Forbidden:
      description: Forbidden - authenticated user lacks required ADMIN role
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            forbidden:
              value:
                code: FORBIDDEN
                message: Administrator privileges required
    Success:
      description: Generic success response
      content:
        application/json:
          schema:
            type: object
          examples:
            ok:
              value:
                code: SUCCESS
                message: Request processed successfully

    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    '200':
      description: Generic OK response
      content:
        application/json:
          schema:
            type: object
            properties:
              message:
                type: string
          examples:
            ok:
              value:
                message: OK

paths:
  /admin/auth/login:
    post:
      tags: [Admin, Auth]
      summary: Administrator login (email/password)
      description: Authenticate an administrator and return access and refresh tokens. Requires role ADMIN.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminLoginRequest'
      responses:
        '200':
          description: Admin authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminLoginResponse'
              examples:
                example:
                  value:
                    accessToken: jwt_access_token
                    refreshToken: jwt_refresh_token
                    admin:
                      id: admin_001
                      fullName: System Administrator
                      email: admin@micrommentor.com
                      roles: [ADMIN]
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /admin/auth/refresh-token:
    post:
      tags: [Admin, Auth]
      summary: Refresh administrator access token
      description: Exchange a refresh token for a new access token. Administrator role required.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refreshToken]
              properties:
                refreshToken:
                  type: string
      responses:
        '200':
          description: New tokens
          content:
            application/json:
              schema:
                type: object
                properties:
                  accessToken:
                    type: string
                  refreshToken:
                    type: string
        '401':
          $ref: '#/components/responses/Unauthorized'

  /admin/auth/logout:
    post:
      tags: [Admin, Auth]
      summary: Logout administrator and revoke refresh token
      description: Revoke refresh token. Requires admin authentication.
      security:
        - bearerAuth: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                refreshToken:
                  type: string
      responses:
        '204':
          description: Logged out
        '401':
          $ref: '#/components/responses/Unauthorized'

  /admin/auth/me:
    get:
      tags: [Admin, Auth]
      summary: Get current authenticated administrator profile
      description: Returns the administrator profile. Requires role ADMIN.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Current admin profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminProfile'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /admin/payments/summary:
    get:
      tags: [Admin, Payments]
      summary: Payment dashboard summary (KPIs)
      description: Returns aggregated payment KPIs for the admin payment dashboard. Requires ADMIN role.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Payment summary
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminPaymentSummary'
              examples:
                example:
                  value:
                    currency: VND
                    totalCollected: 3700000
                    pendingAmount: 800000
                    refundedAmount: 600000
                    successfulPaymentCount: 4
                    pendingPaymentCount: 1
                    refundedPaymentCount: 1
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /admin/payments:
    get:
      tags: [Admin, Payments]
      summary: List payments (admin)
      description: Returns a paginated list of payments with filters for the admin payments table. Requires ADMIN role.
      security:
        - bearerAuth: []
      parameters:
        - name: status
          in: query
          schema:
            $ref: '#/components/schemas/PaymentStatus'
        - name: userId
          in: query
          schema:
            type: string
        - name: expertId
          in: query
          schema:
            type: string
        - name: bookingId
          in: query
          schema:
            type: string
        - name: transactionCode
          in: query
          schema:
            type: string
        - name: startDate
          in: query
          schema:
            type: string
            format: date-time
        - name: endDate
          in: query
          schema:
            type: string
            format: date-time
        - name: page
          in: query
          schema:
            type: integer
          description: Page number (1-based)
        - name: pageSize
          in: query
          schema:
            type: integer
      responses:
        '200':
          description: Paginated payments
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/AdminPayment'
                  pagination:
                    $ref: '#/components/schemas/PaginationMeta'
              examples:
                example:
                  value:
                    items:
                      - id: pay_001
                        paymentDate: '2026-05-10T09:30:00Z'
                        user:
                          id: usr_001
                          fullName: 'Nguyễn Thị Mai'
                        expert:
                          id: exp_001
                          fullName: 'Nguyễn Minh Đức'
                        bookingId: bkg_001
                        amount: 800000
                        currency: VND
                        transactionCode: MM240510001
                        status: PAID
                      - id: pay_002
                        paymentDate: '2026-05-12T14:00:00Z'
                        user:
                          id: usr_002
                          fullName: 'Trần Văn Hùng'
                        expert:
                          id: exp_002
                          fullName: 'Nguyễn Minh Đức'
                        bookingId: bkg_002
                        amount: 800000
                        currency: VND
                        transactionCode: MM240507004
                        status: PENDING
                    pagination:
                      page: 1
                      pageSize: 10
                      totalItems: 7
                      totalPages: 1
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /admin/payments/{paymentId}:
    get:
      tags: [Admin, Payments]
      summary: Get payment detail (admin)
      description: Returns full payment details including refund history and audit log. Requires ADMIN role.
      security:
        - bearerAuth: []
      parameters:
        - name: paymentId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Payment detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminPaymentDetail'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /admin/refunds:
    get:
      tags: [Admin, Refunds]
      summary: List refund requests (admin)
      description: Paginated list of refunds for admin review.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/PerPageParam'
      responses:
        '200':
          description: Paginated refunds
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/AdminRefund'
                  pagination:
                    $ref: '#/components/schemas/PaginationMeta'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /admin/refunds/{refundId}:
    get:
      tags: [Admin, Refunds]
      summary: Get refund request detail (admin)
      description: Returns refund request detail and related payment info.
      security:
        - bearerAuth: []
      parameters:
        - name: refundId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Refund detail
          content:
            application/json:
              schema:
                type: object
                properties:
                  refund:
                    $ref: '#/components/schemas/AdminRefund'
                  audit_log:
                    type: array
